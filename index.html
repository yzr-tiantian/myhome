<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的主页</title>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <style>
    :root {
      --bg-gradient-1: #667eea;
      --bg-gradient-2: #764ba2;
      --card-bg: rgba(255, 255, 255, 0.95);
      --card-shadow: rgba(0, 0, 0, 0.3);
      --text-primary: #333;
      --text-secondary: #666;
      --text-muted: #888;
      --link-bg: #f8f9fa;
      --link-hover-bg: #fff;
      --link-border: #667eea;
      --link-shadow: rgba(102, 126, 234, 0.2);
      --icon-gradient-1: #667eea;
      --icon-gradient-2: #764ba2;
      --social-bg: #f0f0f0;
      --social-icon: #666;
      --border-color: #eee;
      --toggle-bg: #f0f0f0;
      --toggle-icon: #666;
    }

    [data-theme="dark"] {
      --bg-gradient-1: #1a1a2e;
      --bg-gradient-2: #16213e;
      --card-bg: rgba(30, 30, 46, 0.95);
      --card-shadow: rgba(0, 0, 0, 0.5);
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --text-muted: #888;
      --link-bg: #2a2a3e;
      --link-hover-bg: #3a3a4e;
      --link-border: #667eea;
      --link-shadow: rgba(102, 126, 234, 0.3);
      --icon-gradient-1: #667eea;
      --icon-gradient-2: #764ba2;
      --social-bg: #2a2a3e;
      --social-icon: #b0b0b0;
      --border-color: #3a3a4e;
      --toggle-bg: #2a2a3e;
      --toggle-icon: #b0b0b0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: background 0.3s ease;
    }

    .container {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px var(--card-shadow);
      text-align: center;
      position: relative;
      transition: background 0.3s ease;
    }

    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--toggle-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      fill: var(--toggle-icon);
      transition: fill 0.3s ease;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--icon-gradient-1) 0%, var(--icon-gradient-2) 100%);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: white;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .site-name {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      transition: color 0.3s ease;
    }

    .description {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 30px;
      transition: color 0.3s ease;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 30px;
    }

    .link-card {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: var(--link-bg);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.3s ease;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .link-card:hover {
      background: var(--link-hover-bg);
      border-color: var(--link-border);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--link-shadow);
    }

    .link-card.is-email {
      cursor: default;
    }

    .link-card.is-email:hover {
      transform: none;
      border-color: transparent;
      box-shadow: none;
    }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--icon-gradient-1) 0%, var(--icon-gradient-2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .link-content {
      flex: 1;
      text-align: left;
    }

    .link-name {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 2px;
    }

    .link-desc {
      font-size: 12px;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
      transition: border-color 0.3s ease;
    }

    .social-link {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--social-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      background: linear-gradient(135deg, var(--icon-gradient-1) 0%, var(--icon-gradient-2) 100%);
    }

    .social-link:hover svg {
      fill: white;
    }

    .social-link svg {
      width: 18px;
      height: 18px;
      fill: var(--social-icon);
      transition: fill 0.3s ease;
    }

    .loading {
      color: var(--text-secondary);
      padding: 40px;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">加载中...</div>
  </div>

  <script>
    const icons = {
      blog: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>',
      docs: '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
      github: '<svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>',
      twitter: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
      email: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>',
      sun: '<svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>',
      moon: '<svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>',
      default: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>'
    };

    function getTheme() {
      return localStorage.getItem('theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const btn = document.querySelector('.theme-toggle');
      if (btn) {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        btn.innerHTML = isDark ? icons.sun : icons.moon;
        btn.title = isDark ? '切换到亮色模式' : '切换到暗色模式';
      }
    }

    function extractEmail(url) {
      if (url.startsWith('mailto:')) {
        return url.substring(7);
      }
      return null;
    }

    async function loadConfig() {
      try {
        const response = await fetch('config.yaml');
        const yamlText = await response.text();
        const config = jsyaml.load(yamlText);
        renderPage(config);
        setTheme(getTheme());
        updateThemeIcon();
      } catch (error) {
        document.getElementById('app').innerHTML = `
          <div class="loading">配置加载失败，请检查 config.yaml 文件</div>
        `;
        console.error('Failed to load config:', error);
      }
    }

    function renderPage(config) {
      const { site, links, social } = config;
      
      let linksHtml = '';
      if (links && links.length > 0) {
        linksHtml = links.map(link => {
          const email = extractEmail(link.url);
          if (email) {
            return `
              <div class="link-card is-email">
                <div class="link-icon">
                  ${icons[link.icon] || icons.email}
                </div>
                <div class="link-content">
                  <div class="link-name">${link.name}</div>
                  <div class="link-desc">${email}</div>
                </div>
              </div>
            `;
          }
          return `
            <a href="${link.url}" class="link-card" target="_blank" rel="noopener">
              <div class="link-icon">
                ${icons[link.icon] || icons.default}
              </div>
              <div class="link-content">
                <div class="link-name">${link.name}</div>
                ${link.description ? `<div class="link-desc">${link.description}</div>` : ''}
              </div>
            </a>
          `;
        }).join('');
      }

      let socialHtml = '';
      if (social && social.length > 0) {
        socialHtml = social.map(s => `
          <a href="${s.url}" class="social-link" target="_blank" rel="noopener" title="${s.name}">
            ${icons[s.icon] || icons.default}
          </a>
        `).join('');
      }

      document.getElementById('app').innerHTML = `
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
          ${icons.moon}
        </button>
        <div class="avatar">
          ${site.avatar ? `<img src="${site.avatar}" alt="avatar">` : site.name.charAt(0)}
        </div>
        <h1 class="site-name">${site.name}</h1>
        ${site.description ? `<p class="description">${site.description}</p>` : ''}
        
        <div class="links">
          ${linksHtml}
        </div>
        
        ${socialHtml ? `<div class="social-links">${socialHtml}</div>` : ''}
      `;
      
      updateThemeIcon();
    }

    loadConfig();
  </script>
</body>
</html>
